version: 1

services:
  # PostgreSQL Database
  postgres:
    type: pgsql
    name: finai-postgres
    databaseName: finforge
    user: finuser
    password: ${POSTGRES_PASSWORD}
    region: oregon
    plan: free

  # Redis for Celery
  redis:
    type: redis
    name: finai-redis
    region: oregon
    plan: free

  api:
    build: .
    command: python app.py --mode api
    
  # FastAPI Backend (API + Admin)
  api:
    type: web
    name: finai-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
    regions: [oregon]
    plan: free

  # FinAi Chat UI (Gradio)
  chat-ui:
    type: web
    name: finai-chat
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: python -m src.frontend.chat_ui
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    regions: [oregon]
    plan: free

  # User Dashboard (Streamlit)
  user-dashboard:
    type: web
    name: finai-dashboard
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: streamlit run src/frontend/user_dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    regions: [oregon]
    plan: free

  # Celery Worker (background tasks)
  worker:
    type: worker
    name: finai-worker
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: celery -A src.celery_app.tasks worker --loglevel=info --beat
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
    regions: [oregon]
    plan: free