version: 1

# PostgreSQL Database
databases:
  - name: finai-postgres
    databaseName: finforge
    user: finuser
    password: ${POSTGRES_PASSWORD}
    region: oregon
    plan: free

# Redis for Celery / caching
services:
  - type: redis
    name: finai-redis
    region: oregon
    plan: free

  # FastAPI Backend (API + serves React frontend)
  - type: web
    name: finai-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
    regions: [oregon]
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true

  # Celery Worker
  - type: worker
    name: finai-worker
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: celery -A src.celery_app.tasks worker --loglevel=info --beat
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finai-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: finai-api
          property: JWT_SECRET_KEY
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
    regions: [oregon]
    plan: free
