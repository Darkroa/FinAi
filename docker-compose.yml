version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: finpass
      POSTGRES_DB: finforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ====================== Backend API ======================
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://finuser:finpass@postgres:5432/finforge
      - REDIS_URL=redis://redis:6379/0
      - GROK_API_KEY=${GROK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - API_BASE_URL=/api   # Optional: helps if your app needs to know the public path
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  # ====================== Chat UI (Gradio) ======================
  chat-ui:
    build: .
    command: python -m src.frontend.chat_ui
    depends_on:
      - api
    volumes:
      - .:/app
    restart: unless-stopped

  # ====================== Trading Dashboard ======================
  trading-dashboard:
    build: .
    command: python -m src.frontend.bot_dashboard
    depends_on:
      - api
    volumes:
      - .:/app
    restart: unless-stopped

  # ====================== User Dashboard (Streamlit) ======================
  user-dashboard:
    build: .
    command: streamlit run src/frontend/user_dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    depends_on:
      - api
    volumes:
      - .:/app
    restart: unless-stopped

  # ====================== Admin Panel (Streamlit) ======================
  admin:
    build: .
    command: streamlit run admin/admin_dashboard.py --server.port 8502 --server.address 0.0.0.0 --server.headless true
    depends_on:
      - api
    volumes:
      - .:/app
    restart: unless-stopped

  # ====================== Nginx Reverse Proxy (Single Entry Point) ======================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"          # Main access port → http://localhost
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/frontend/landing:/usr/share/nginx/html:ro   # Static landing page
    depends_on:
      - api
      - chat-ui
      - trading-dashboard
      - user-dashboard
      - admin
    restart: unless-stopped

volumes:
  postgres_data:
